<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>시장 브리핑</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; line-height: 1.6; }

  .nav { background: #1e293b; border-bottom: 1px solid #334155; padding: 12px 24px; display: flex; gap: 16px; align-items: center; }
  .nav a { color: #94a3b8; text-decoration: none; font-size: 14px; padding: 6px 12px; border-radius: 6px; transition: all 0.2s; }
  .nav a:hover { color: #e2e8f0; background: #334155; }
  .nav a.active { color: #60a5fa; background: #1e3a5f; }

  .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
  h1 { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
  .subtitle { color: #64748b; font-size: 14px; margin-bottom: 24px; }

  .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .summary-text { font-size: 15px; color: #cbd5e1; line-height: 1.8; }

  /* Period Tabs */
  .period-tabs { display: flex; gap: 4px; margin-bottom: 20px; background: #1e293b; border-radius: 10px; padding: 4px; border: 1px solid #334155; }
  .period-tab { flex: 1; padding: 10px 16px; border-radius: 8px; border: none; background: transparent; color: #64748b; font-size: 13px; font-weight: 600; cursor: pointer; text-align: center; transition: all 0.2s; }
  .period-tab:hover { color: #e2e8f0; background: rgba(255,255,255,0.03); }
  .period-tab.active { color: #60a5fa; background: #1e3a5f; }
  .period-tab .tab-sub { font-size: 11px; font-weight: 400; color: #475569; display: block; margin-top: 2px; }
  .period-tab.active .tab-sub { color: #60a5fa88; }

  /* Macro */
  .macro-grid { display: flex; gap: 12px; flex-wrap: wrap; }
  .macro-item { background: #0f172a; border-radius: 8px; padding: 14px; flex: 1; min-width: 250px; }
  .macro-label { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .macro-label.us { color: #60a5fa; }
  .macro-label.kr { color: #f472b6; }
  .macro-label.global { color: #34d399; }
  .macro-text { font-size: 13px; color: #94a3b8; }

  /* Stocks Table */
  .stocks-table { width: 100%; border-collapse: collapse; }
  .stocks-table th { text-align: left; font-size: 12px; color: #64748b; font-weight: 600; padding: 8px 12px; border-bottom: 1px solid #334155; text-transform: uppercase; letter-spacing: 0.5px; }
  .stocks-table td { padding: 10px 12px; border-bottom: 1px solid #1e293b; font-size: 13px; vertical-align: top; }
  .stocks-table tr:hover { background: #1e293b; }
  .stock-name { font-weight: 600; color: #f1f5f9; }
  .mention-count { display: inline-flex; align-items: center; justify-content: center; min-width: 24px; height: 24px; border-radius: 12px; font-size: 12px; font-weight: 700; padding: 0 8px; }
  .mention-high { background: #7c3aed33; color: #a78bfa; }
  .mention-med { background: #2563eb33; color: #60a5fa; }
  .mention-low { background: #33415533; color: #94a3b8; }
  .channel-tag { display: inline-block; font-size: 11px; background: #334155; color: #94a3b8; padding: 2px 8px; border-radius: 4px; margin: 1px 2px; }
  .multi-channel { background: #7c3aed22; color: #a78bfa; border: 1px solid #7c3aed44; }

  .sentiment { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 4px; }
  .sentiment-positive { background: #05966922; color: #34d399; }
  .sentiment-negative { background: #dc262622; color: #f87171; }
  .sentiment-neutral { background: #33415544; color: #94a3b8; }

  /* Themes */
  .themes-grid { display: flex; flex-wrap: wrap; gap: 12px; }
  .theme-card { background: #0f172a; border-radius: 8px; padding: 14px; border-left: 3px solid #334155; flex: 1 1 320px; max-width: calc(33.33% - 8px); }
  .theme-card.positive { border-left-color: #34d399; }
  .theme-card.negative { border-left-color: #f87171; }
  .theme-card.neutral { border-left-color: #60a5fa; }
  .theme-title { font-size: 14px; font-weight: 600; margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
  .theme-summary { font-size: 13px; color: #94a3b8; margin-bottom: 8px; }
  .theme-channels { font-size: 11px; color: #64748b; }

  /* Key Numbers */
  .numbers-grid { display: flex; flex-wrap: wrap; gap: 12px; }
  .number-card { background: #0f172a; border-radius: 8px; padding: 14px; text-align: center; flex: 1; min-width: 150px; }
  .number-label { font-size: 12px; color: #64748b; margin-bottom: 4px; }
  .number-value { font-size: 20px; font-weight: 700; color: #f1f5f9; }
  .number-change { font-size: 13px; margin-top: 2px; }
  .number-change.up { color: #f87171; }
  .number-change.down { color: #60a5fa; }

  /* History badge */
  .history-badge { display: inline-block; font-size: 10px; padding: 1px 6px; border-radius: 3px; margin-left: 6px; }
  .history-new { background: #059669; color: white; }
  .history-recurring { background: #7c3aed33; color: #a78bfa; }
  .history-days { font-size: 11px; color: #64748b; }

  .section { margin-bottom: 24px; }
  .section-title { font-size: 13px; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
  .loading { text-align: center; padding: 60px; color: #64748b; }
  .error { text-align: center; padding: 60px; color: #f87171; }

  @media (max-width: 768px) {
    .theme-card { max-width: 100%; }
    .period-tabs { flex-wrap: wrap; }
  }
</style>
</head>
<body>

<div class="nav">
  <a href="index.html">포트폴리오</a>
  <a href="loan_timeline.html">대출/자산</a>
  <a href="briefing.html" class="active">시장 브리핑</a>
</div>

<div class="container">
  <h1>시장 브리핑</h1>
  <div class="subtitle" id="subtitle">텔레그램 채널 종합 요약</div>

  <div class="period-tabs" id="periodTabs">
    <button class="period-tab active" data-period="daily" onclick="selectPeriod('daily')">
      오늘<span class="tab-sub">당일 뉴스</span>
    </button>
    <button class="period-tab" data-period="weekly" onclick="selectPeriod('weekly')">
      1주<span class="tab-sub">7일 동향</span>
    </button>
    <button class="period-tab" data-period="biweekly" onclick="selectPeriod('biweekly')">
      2주<span class="tab-sub">14일 동향</span>
    </button>
    <button class="period-tab" data-period="monthly" onclick="selectPeriod('monthly')">
      4주<span class="tab-sub">28일 동향</span>
    </button>
  </div>

  <div id="content">
    <div class="loading">데이터 로딩 중...</div>
  </div>
</div>

<script>
let summaryData = {};
let currentPeriod = 'daily';

async function loadData() {
  try {
    const resp = await fetch('briefing_summary.json');
    if (!resp.ok) throw new Error('not found');
    summaryData = await resp.json();
    selectPeriod('daily');
  } catch (e) {
    document.getElementById('content').innerHTML =
      '<div class="error">브리핑 요약 데이터가 없습니다.<br>스케줄 에이전트가 데이터를 생성할 때까지 기다려주세요.</div>';
  }
}

function selectPeriod(period) {
  currentPeriod = period;
  document.querySelectorAll('.period-tab').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.period === period);
  });
  const data = summaryData[period];
  if (data) {
    renderSummary(data, period);
  } else {
    document.getElementById('content').innerHTML =
      `<div class="error">${periodLabel(period)} 데이터가 아직 없습니다.</div>`;
  }
}

function periodLabel(p) {
  const labels = { daily: '오늘', weekly: '1주', biweekly: '2주', monthly: '4주' };
  return labels[p] || p;
}

function sentimentClass(s) {
  return s === 'positive' ? 'sentiment-positive' : s === 'negative' ? 'sentiment-negative' : 'sentiment-neutral';
}

function sentimentEmoji(s) {
  return s === 'positive' ? '+' : s === 'negative' ? '-' : '~';
}

function mentionClass(count, channels) {
  if (channels && channels.length >= 3) return 'mention-high';
  if (count >= 3 || (channels && channels.length >= 2)) return 'mention-med';
  return 'mention-low';
}

function renderSummary(data, period) {
  const stocks = data.stocks || [];
  const themes = data.themes || [];
  const macro = data.macro || {};
  const numbers = data.key_numbers || [];
  const multiChannelStocks = stocks.filter(s => (s.channels || []).length >= 2);
  const isMultiDay = period !== 'daily';

  let html = '';

  // Period info
  if (data.period) {
    html += `<div style="color:#64748b; font-size:13px; margin-bottom:16px;">${data.period}</div>`;
  }

  // Market Summary
  html += `
    <div class="section">
      <div class="section-title">${isMultiDay ? periodLabel(period) + ' 종합 동향' : '시장 종합'}</div>
      <div class="card">
        <div class="summary-text">${data.market_summary || ''}</div>
      </div>
    </div>`;

  // Key Numbers (daily only)
  if (numbers.length > 0) {
    html += `
      <div class="section">
        <div class="section-title">주요 지표</div>
        <div class="numbers-grid">
          ${numbers.map(n => {
            const changeDir = (n.change || '').startsWith('+') ? 'up' :
                              (n.change || '').startsWith('-') ? 'down' : '';
            return `
              <div class="number-card">
                <div class="number-label">${n.label}</div>
                <div class="number-value">${n.value}</div>
                ${n.change ? `<div class="number-change ${changeDir}">${n.change}</div>` : ''}
              </div>`;
          }).join('')}
        </div>
      </div>`;
  }

  // Macro
  if (macro.us || macro.kr || macro.global) {
    html += `
      <div class="section">
        <div class="section-title">매크로</div>
        <div class="macro-grid">
          ${macro.kr ? `<div class="macro-item"><div class="macro-label kr">한국</div><div class="macro-text">${macro.kr}</div></div>` : ''}
          ${macro.us ? `<div class="macro-item"><div class="macro-label us">미국</div><div class="macro-text">${macro.us}</div></div>` : ''}
          ${macro.global ? `<div class="macro-item"><div class="macro-label global">글로벌</div><div class="macro-text">${macro.global}</div></div>` : ''}
        </div>
      </div>`;
  }

  // Themes
  if (themes.length > 0) {
    html += `
      <div class="section">
        <div class="section-title">${isMultiDay ? '주요 테마 흐름' : '주요 테마'}</div>
        <div class="themes-grid">
          ${themes.map(t => `
            <div class="theme-card ${t.sentiment || 'neutral'}">
              <div class="theme-title">
                ${t.title}
                <span class="sentiment ${sentimentClass(t.sentiment)}">${sentimentEmoji(t.sentiment)}</span>
                ${t.days_active ? `<span class="history-badge history-recurring">${t.days_active}일</span>` : ''}
              </div>
              <div class="theme-summary">${t.summary}</div>
              ${t.evolution ? `<div style="font-size:12px;color:#94a3b8;margin-bottom:6px;border-top:1px solid #334155;padding-top:6px;">${t.evolution}</div>` : ''}
              <div class="theme-channels">${(t.mentioned_in || []).map(c =>
                `<span class="channel-tag">${c}</span>`
              ).join('')}</div>
            </div>
          `).join('')}
        </div>
      </div>`;
  }

  // Stocks - multi-channel highlight
  if (multiChannelStocks.length > 0) {
    html += `
      <div class="section">
        <div class="section-title">${isMultiDay ? '반복 언급 종목' : '복수 채널 언급 종목'}</div>
        <div class="card">
          <table class="stocks-table">
            <thead><tr>
              <th>종목</th><th>언급</th><th>${isMultiDay ? '언급일수' : '채널'}</th><th>센티먼트</th><th>맥락</th>
            </tr></thead>
            <tbody>
              ${multiChannelStocks.map(s => `
                <tr>
                  <td><span class="stock-name">${s.name}</span>${s.ticker ? ` <span style="color:#64748b;font-size:11px">${s.ticker}</span>` : ''}</td>
                  <td><span class="mention-count ${mentionClass(s.mention_count, s.channels)}">${s.mention_count}</span></td>
                  <td>${isMultiDay && s.days_mentioned ? `<span class="history-days">${s.days_mentioned}일</span>` : ''}
                    ${(s.channels || []).map(c => `<span class="channel-tag multi-channel">${c}</span>`).join('')}</td>
                  <td><span class="sentiment ${sentimentClass(s.sentiment)}">${s.sentiment || '-'}</span></td>
                  <td style="color:#94a3b8;font-size:12px;max-width:300px">${s.context || ''}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      </div>`;
  }

  // All stocks
  if (stocks.length > 0) {
    html += `
      <div class="section">
        <div class="section-title">전체 언급 종목 (${stocks.length}개)</div>
        <div class="card">
          <table class="stocks-table">
            <thead><tr>
              <th>종목</th><th>언급</th><th>${isMultiDay ? '일수/채널' : '채널'}</th><th>센티먼트</th><th>맥락</th>
            </tr></thead>
            <tbody>
              ${stocks.map(s => `
                <tr>
                  <td><span class="stock-name">${s.name}</span>${s.ticker ? ` <span style="color:#64748b;font-size:11px">${s.ticker}</span>` : ''}</td>
                  <td><span class="mention-count ${mentionClass(s.mention_count, s.channels)}">${s.mention_count}</span></td>
                  <td>${isMultiDay && s.days_mentioned ? `<span class="history-days">${s.days_mentioned}일</span> ` : ''}${(s.channels || []).map(c => {
                    const cls = (s.channels || []).length >= 2 ? 'channel-tag multi-channel' : 'channel-tag';
                    return `<span class="${cls}">${c}</span>`;
                  }).join('')}</td>
                  <td><span class="sentiment ${sentimentClass(s.sentiment)}">${s.sentiment || '-'}</span></td>
                  <td style="color:#94a3b8;font-size:12px;max-width:300px">${s.context || ''}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      </div>`;
  }

  document.getElementById('content').innerHTML = html;
  const periodText = { daily: '당일 뉴스', weekly: '최근 1주 동향', biweekly: '최근 2주 동향', monthly: '최근 4주 동향' };
  document.getElementById('subtitle').textContent =
    `${data.date || ''} ${data.period || ''} · ${periodText[period] || ''}`;
}

loadData();
</script>
</body>
</html>
