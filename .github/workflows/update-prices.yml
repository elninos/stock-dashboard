name: Auto Update Prices

on:
  schedule:
    - cron: '0 0 * * 1-5'   # 평일 오전 9시 KST (UTC 00:00)
    - cron: '30 6 * * 1-5'  # 평일 오후 3시 30분 KST (UTC 06:30, 장마감 후)
  workflow_dispatch:         # 수동 실행 가능

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      deployments: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch latest prices
        run: python fetch_prices.py

      - name: Build dashboard
        run: python build_dashboard.py

      - name: Copy built files to _deploy
        run: |
          cp index.html _deploy/
          cp loan_timeline.html _deploy/ 2>/dev/null || true
          cp briefing_summary.json _deploy/
          cp stock_news.json _deploy/ 2>/dev/null || true
          cp -r functions _deploy/ 2>/dev/null || true

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy _deploy --project-name=stock-dashboard

      - name: Commit updated files to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prices.json stock_map.json _deploy/
          git diff --cached --quiet || git commit -m "Auto price update $(date '+%Y-%m-%d %H:%M') KST"
          git push
