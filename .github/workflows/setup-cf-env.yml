name: Setup Cloudflare Pages Env (One-time)

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest

    steps:
      - name: Set GITHUB_TOKEN env var in Cloudflare Pages
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          GH_TOKEN_VALUE: ${{ secrets.BRIEFING_GH_TOKEN }}
        run: |
          # First, get the current project settings
          CURRENT=$(curl -s \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/pages/projects/stock-dashboard")

          echo "Current project fetched: $(echo $CURRENT | python3 -c 'import sys,json; d=json.load(sys.stdin); print(d.get("success","?"))')"

          # Patch the project to add/update the deployment_configs env var
          RESULT=$(curl -s -X PATCH \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/pages/projects/stock-dashboard" \
            -d "{
              \"deployment_configs\": {
                \"production\": {
                  \"env_vars\": {
                    \"GITHUB_TOKEN\": {
                      \"value\": \"$GH_TOKEN_VALUE\"
                    }
                  }
                },
                \"preview\": {
                  \"env_vars\": {
                    \"GITHUB_TOKEN\": {
                      \"value\": \"$GH_TOKEN_VALUE\"
                    }
                  }
                }
              }
            }")

          echo "Result: $(echo $RESULT | python3 -c 'import sys,json; d=json.load(sys.stdin); print("success=" + str(d.get("success","?")))')"

          # Check for errors
          SUCCESS=$(echo $RESULT | python3 -c 'import sys,json; d=json.load(sys.stdin); print(d.get("success", False))')
          if [ "$SUCCESS" != "True" ]; then
            echo "ERROR: $RESULT"
            exit 1
          fi

          echo "✓ GITHUB_TOKEN set in Cloudflare Pages (production + preview)"
