name: Auto Update Briefing

on:
  schedule:
    # 매 2시간 — KST 08:00~00:00, 새벽 02:00~08:00 제외 (취침 시간)
    # 미국장 포함: 22:00~00:00 KST = 미장 오전 활발 시간대
    - cron: '0 23 * * 0-4'   # 08:00 KST (장 시작 전)
    - cron: '0 1 * * 1-5'    # 10:00 KST (오전 장중)
    - cron: '0 3 * * 1-5'    # 12:00 KST (점심)
    - cron: '0 5 * * 1-5'    # 14:00 KST (오후 장중)
    - cron: '0 7 * * 1-5'    # 16:00 KST (장 마감 후)
    - cron: '0 9 * * 1-5'    # 18:00 KST (저녁)
    - cron: '0 11 * * 1-5'   # 20:00 KST (미장 오픈)
    - cron: '0 13 * * 1-5'   # 22:00 KST (미장 활발)
    - cron: '0 15 * * 1-5'   # 00:00 KST (미장 마감 전, 취침 전 마지막)
  workflow_dispatch:          # 수동 실행 가능

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      deployments: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic

      - name: Fetch briefing posts
        run: python fetch_briefing.py

      - name: Generate AI summary
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python summarize_briefing.py

      - name: Build dashboard
        run: python build_dashboard.py

      - name: Copy built files to _deploy
        run: |
          cp index.html _deploy/
          cp loan_timeline.html _deploy/ 2>/dev/null || true
          cp briefing_summary.json _deploy/

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy _deploy --project-name=stock-dashboard

      - name: Commit updated files to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add briefing.json briefing_summary.json _deploy/
          git diff --cached --quiet || git commit -m "Auto briefing update $(date '+%Y-%m-%d %H:%M') KST"
          git push
