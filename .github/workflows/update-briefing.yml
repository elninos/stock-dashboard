name: Fetch Briefing Data

# AI 요약은 Windows PC (Claude Max, 무료)에서 실행됨.
# 이 workflow는 데이터 수집만 담당. 빌드/배포는 deploy.yml 또는 update-prices.yml 처리.
on:
  schedule:
    # 매 2시간 — KST 08:00~22:00 (취침 시간 제외)
    - cron: '0 23 * * 0-4'   # 08:00 KST (일~목)
    - cron: '0 1,3,5,7,9,11,13 * * 1-5'  # 10:00~22:00 KST 홀수시간 (월~금)
  workflow_dispatch:           # 수동 실행 가능

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch briefing posts
        run: python fetch_briefing.py

      - name: Fetch stock news (raw)
        run: python fetch_stock_news.py
        continue-on-error: true

      - name: Commit updated raw data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add briefing.json stock_news_raw.json
          git diff --cached --quiet || git commit -m "Auto fetch briefing $(date '+%Y-%m-%d %H:%M') KST"
          git pull --rebase origin main
          git push
